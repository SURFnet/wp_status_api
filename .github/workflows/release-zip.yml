name: Build plugin zip

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  zip:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up PHP (for Composer)
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          tools: composer

      - name: Install Composer dependencies (no-dev)
        run: composer install --no-dev --prefer-dist --no-interaction --no-progress

      - name: Create zip (plugin folder in root)
        run: |
          PLUGIN_SLUG="wp_status_api"
          ZIP_NAME="${PLUGIN_SLUG}-${GITHUB_REF_NAME}.zip"
          mkdir -p dist package/"${PLUGIN_SLUG}"
          rsync -a --delete \
            --exclude ".git" \
            --exclude ".github" \
            --exclude "node_modules" \
            --exclude "coverage" \
            --exclude "tmp" \
            --exclude "temp" \
            --exclude "package" \
            --exclude "dist" \
            ./ package/"${PLUGIN_SLUG}"/
          (cd package && zip -r "../dist/${ZIP_NAME}" "${PLUGIN_SLUG}")
          echo "ZIP_NAME=${ZIP_NAME}" >> "$GITHUB_ENV"

      - name: Create release and upload zip
        uses: softprops/action-gh-release@v2
        with:
          files: dist/${{ env.ZIP_NAME }}

